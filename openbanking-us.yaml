        - name: startDate
          in: query
          required: true
          description:
            The earliest date to be analyzed in this report. The range between
            startDate and endDate must be 31 days or less.
          schema:
            type: integer
            example: 1609459200
        - name: endDate
          in: query
          required: true
          description: The latest date to be analyzed in this report
          schema:
            type: integer
            example: 1612137600
        - name: size
          in: query
          required: false
          description:
            The size of the results returned per page. By default, this is 100
            results per page and can be no more than 1000 results per page.
          schema:
            type: integer
            default: 100
            maximum: 1000
            example: 100
