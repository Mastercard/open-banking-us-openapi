      tags:
        - Reports
      summary: Get Billing Summary for Partner
      operationId: getResellerBillingReport
      description:
        Use the Partner ID to fetch all reports generated by a partner. A
        partner can get their own reports and a reseller partner can get the
        reports for their customer’s partner account as long as the partner is
        set up with them as the reseller.
      parameters:
