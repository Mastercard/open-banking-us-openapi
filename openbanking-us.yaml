          schema:
            $ref: '#/components/schemas/EventStatusUpdate'

    OauthUrl:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: >-
              Used to request an oauth url for a given a given institution and
              customer.
            required:
              - customerId
              - serviceAgreement
              - redirectURI
            properties:
              redirectURI:
                description:
                  The `redirectURI` will be called when the oauth session has
                  completed.
                type: string
                format: uri
                example: 'https://oauth.example.com/redirect'
                minLength: 1
                maxLength: 1024
              customerId:
                $ref: '#/components/schemas/CustomerId'
              configurationId:
                $ref: '#/components/schemas/ConfigurationId'
              serviceAgreement:
                $ref: '#/components/schemas/ServiceAgreement'
