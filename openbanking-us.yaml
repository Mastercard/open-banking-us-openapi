    post:
      x-internal: true
      tags:
        - Identity
      summary: Account Owner Match
      description: "This service returns a confidence score measuring if the
        values provided in the request match the account holder details
        retrieved from an institution. The following data objects are available.

        * Account holders


        * Addresses


        * Emails


        * Phones


        * Documentations


        * Identity insights


        * Matching scores


        Any customer information included in the request should be obtained from
        a separate source, not from the customer's connected account; while the
        name value is required, all other data elements are optional. The
        account owner data elements (name, address, email, phone, etc.) returned
        in the response are obtained from the customer's financial institution
        and will be accompanied by a matching score for any value(s) provided in
        the request. These scores range from 0 to 100, with a higher number
        signifying an increased confidence that the two values are matching.


        Note: The data returned varies from institution to institution as not
        all of them make the same data available. This is a premium service,
        billable per each successful API call.


