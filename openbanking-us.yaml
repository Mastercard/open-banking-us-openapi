      summary: Generate VOA With Income Report for the Customer
      description: >-
        Generate a Verification of Assets with Income (VOAI) report for all
        checking, savings, money market, and investment accounts for the given
        customer.


        This service retrieves up to 24 months of transaction history for each
        account and uses this information to generate the VOAI report. By
        default, the history is set to 61 days, however, you can change the
        transaction history by setting the `fromDate` parameter. The report also
        includes up to 24 months of income credit transactions (ordered by
        account and confidence level) regardless of `fromDate` for income
        verification.


        With `incomeFromDate`, user can alter the income data to be displayed in
        the Report.


        This is a premium service. The billable event is the successful
        generation of a VOAI report.


        Before calling this API, a consumer must be created for the given
        customer ID (see Consumers APIs).


        If no account of type checking, savings, money market, or investment is
        found, the service will return HTTP 400 Bad Request.


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)
