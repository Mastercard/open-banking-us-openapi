        '401':
          $ref: '#/components/responses/AuthenticationUnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/GetPaymentEnablementBundleResourceNotFoundForAccountIdErrorResponse'
  '/decisioning/customers/{customerId}/sbca':
