  '/aggregation/customers/{customerId}/transactions/refreshes':
    post:
      tags:
        - Transactions
      summary: Trigger Customer Account Refresh
      description: >-
        This API asynchronously initiates either a standard refresh or a
        historical data load using the provided `institutionLoginId` or specific
        `accountIds`. It supports default durations of 6 months for standard
        refresh and 24 months for historical load or a custom date range for
        targeted data retrieval. The behavior depends on the provided `mode`
        value.  

        Client apps are not permitted to automate calls to the Refresh services.
        Active accounts are automatically refreshed by Finicity once per day.
        Because many financial institutions only post transactions once per day,
        calling Refresh repeatedly is usually a waste of resources and is not
        recommended.  

        Apps may call Refresh services for a specific customer when there is a
        specific business case for the need of data that is up to date as of the
        moment. Please discuss with your account manager and systems engineer
        for further clarification.        


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)
      operationId: refreshTransactions
      parameters:
        - $ref: '#/components/parameters/CustomerIdParameter'
      requestBody:
        $ref: '#/components/requestBodies/TransactionRefreshRequest'
      responses:
        '202':
          $ref: '#/components/responses/TransactionRefreshResponse'
        '400':
          $ref: '#/components/responses/TransactionRefreshBadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/TransactionRefreshNotFoundErrorResponse'
  '/aggregation/customers/{customerId}/transactions/refreshes/{refreshId}':
    get:
      tags:
        - Transactions
      summary: Get Customer Account Refresh Status
      description: >-
        Fetch the current status of the transaction refresh request by
        refreshId.  

        Status can also be received through webhook notification by subscribing
        to the `data-refresh.transaction.status-changed` event (see
        [OBWMS](https://developer.mastercard.com/open-finance-us/documentation/webhooks/obwms/#overview-of-obwms)
        documentation for more details)  


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)
      operationId: getTransactionRefreshStatus
      parameters:
        - $ref: '#/components/parameters/CustomerIdParameter'
        - $ref: '#/components/parameters/TransactionRefreshIDParameter'
      responses:
        '200':
          $ref: '#/components/responses/TransactionRefreshStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/TransactionRefreshStatusNotFoundErrorResponse'
