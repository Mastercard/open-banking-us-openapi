  '/aggregation/v1/customers/{customerId}/accounts/{accountId}/availableBalance/live':
    get:
      tags:
        - Payments
      summary: Get Available Balance
      description: >-
        Retrieve the available and cleared account balances for a single account
        in real-time directly from a financial institution.

        You can define an additional query parameter `balance_cache_interval` to
        specify the time interval of the last cached balance. This parameter is
        used by the server to determine whether the cached balance is still
        valid or if it needs to be refreshed.


        _The default caching behavior of this endpoint will change on 30 June
        2026._


        Currently: if `balance_cache_interval` is not specified, it defaults to
        0 (a live balance is retrieved).


        From 30 June 2026: if `balance_cache_interval` is not specified, it
        defaults to 30 minutes (a cached balance is returned).


        _Action required_: If you want to maintain the current behavior, update
        your application to explicitly request `balance_cache_interval=0` before
        30 June 2026.


        Note: this is a premium service, billable per every successful API call.


        _Supported account types_: "checking", "savings", "moneyMarket", "cd"


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)
      operationId: GetAvailableBalanceLive
      parameters:
        - $ref: '#/components/parameters/CustomerIdParameter'
        - $ref: '#/components/parameters/AccountIdParameter'
        - $ref: '#/components/parameters/AllowedBalanceCacheIntervalParameter'
      responses:
        '200':
          $ref: '#/components/responses/GetAvailableBalanceLiveResponse'
        '400':
          $ref: '#/components/responses/GetAvailableBalanceLiveBadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/ResourceNotFoundErrorResponse'
