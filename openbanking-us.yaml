  '/decisioning/customers/{customerId}/reports/foresight-analytics/userTypes/{userType}':
    post:
      tags:
        - Consumer Foresight
      summary:
        Generate foresight analytics non-CRA report for the customer - Personal
      description: >-
        Generate a foresight analytics non-CRA report for a given customer. The
        report includes benchmarking and forecasting data for a customer based
        on inputs of account and transaction data as permitted by the customer,
        and segments (e.g., postal code) provided by the partner. A consumer is
        not required to generate this report.


        If no account type of checking, credit card, or savings is found, the
        service will return an HTTP 400 Bad Request.


        This is a premium service, billable per every successful API call for
        non-testing customers. A successful call to this API will generate a
        foresight analytics report which can be retrieved via Get Report by
        Customer.


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)
      operationId: GenerateForesightAnalyticsNonCraReport
      parameters:
        - $ref: '#/components/parameters/CustomerIdParameter'
        - $ref: '#/components/parameters/PersonalUserTypeParameter'
        - $ref: '#/components/parameters/ReportCallbackUrlParameter'
      requestBody:
        $ref: '#/components/requestBodies/GenerateForesightAnalyticsNonCraReportRequest'
      responses:
        '202':
          $ref: '#/components/responses/GenerateForesightAnalyticsNonCraReportResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/SecurityFreezeErrorResponse'
        '404':
          $ref: '#/components/responses/ResourceNotFoundErrorResponse'
  '/decisioning/reports/foresight-analytics/userTypes/{userType}':
    post:
      tags:
        - Consumer Foresight
      summary:
        Generate Non CRA Foresight Analytics Report Using 1st/3rd Party
        Transaction Data
      description: >-
        Generate a non-CRA Foresight Analytics report for the provided customer.
        The report includes benchmarking and forecasting insights into the
        customer's spending habits compared against other Mastercard profiles
        across various inputted segments.


        To use third-party data permissioned via Data Connect, provide a
        `customerId` value in the request body.


        To use first-party data you submitted via Data Enrichment, provide the
        `externalCustomerId` you supplied when uploading the data.


        You can use third-party data, first-party data, or both in the same
        request.


        Supported account types are checking, savings and credit card. A
        consumer is not required to generate this report.


        This is a premium service, billable per every successful API call. A
        successful call to this API will generate a Foresight Analytics report
        which is retrieved by calling Get Report by Report ID.


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)
      operationId: GenerateForesightAnalyticsFirstThirdPartyNonCraReport
      parameters:
        - $ref: '#/components/parameters/PersonalUserTypeParameter'
        - $ref: '#/components/parameters/ReportCallbackUrlParameter'
      requestBody:
        $ref: '#/components/requestBodies/GenerateForesightAnalyticsFirstThirdPartyNonCraReportRequest'
      responses:
        '202':
          $ref: '#/components/responses/GenerateForesightAnalyticsFirstThirdPartyNonCraReportResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/SecurityFreezeErrorResponse'
        '404':
          $ref: '#/components/responses/ResourceNotFoundErrorResponse'
  '/transfer/customers/{customer_id}/bill-pay-switches/{switch_id}':
    get:
