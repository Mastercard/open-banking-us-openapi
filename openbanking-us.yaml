  '/aggregation/v1/paysuite/customers/{customerId}/institutionLogins/{institutionLoginId}/accounts':
    get:
      tags:
        - Payment Enablement Bundle
      description: >-
        This bundled API returns any or all of the Payments endpoints in one API
        call using institution login ID. This includes, Account Simple details,
        ACH details, Account Owner, and Account Balance. This requires initial
        setup to determine which endpoints are included in the API response.

        For Account Balance, You can define an additional query parameter
        `balance_cache_interval` to specify the time interval of the last cached
        balance.  This parameter is used by the server to determine whether the
        cached balance is still valid or if it needs to be refreshed.


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)
      summary: Fetch all the requested field details using institution login ID
      operationId: GetAccountDetailsByInstitutionLoginId
      parameters:
        - $ref: '#/components/parameters/CustomerIdParameter'
        - $ref: '#/components/parameters/InstitutionLoginIdParameterPEB'
        - $ref: '#/components/parameters/IncludeParameter'
        - $ref: '#/components/parameters/PebAllowedBalanceCacheIntervalParameter'
      responses:
        '200':
          $ref: '#/components/responses/GetPaymentEnablementBundleResponse'
        '400':
          $ref: '#/components/responses/GetPaymentEnablementBundleBadRequestErrorResponse'
        '401':
          $ref: '#/components/responses/AuthenticationUnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/GetPaymentEnablementBundleResourceNotFoundForInstitutionLoginIdErrorResponse'
  '/aggregation/v1/paysuite/customers/{customerId}/accounts/{accountId}':
    get:
      tags:
        - Payment Enablement Bundle
      description: >-
        This bundled API will return any or all of the Payments endpoints in one
        API call using account ID. This includes, Account Simple details, ACH
        details, Account Owner, and Account Balance. This requires initial setup
        to determine which endpoints are included in the API response.

        For Account Balance, You can define an additional query parameter
        `balance_cache_interval` to specify the time interval of the last cached
        balance.  This parameter will be used by the server to determine whether
        the cached balance is still valid or if it needs to be refreshed.


        _Supported regions_: ![🇺🇸](https://flagcdn.com/20x15/us.png)

      summary: Fetch all the requested details using the account ID
      operationId: GetAccountDetailsByAccountId
      parameters:
        - $ref: '#/components/parameters/CustomerIdParameter'
        - $ref: '#/components/parameters/AccountIdParameter'
        - $ref: '#/components/parameters/IncludeParameter'
        - $ref: '#/components/parameters/PebAllowedBalanceCacheIntervalParameter'
      responses:
