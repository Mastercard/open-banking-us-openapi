      summary: Generate FCRA Payment Success Indicators
      description: >-
        Payment Success Indicator (PSI) allows the user to evaluate the
        likelihood of a specific ACH transaction resulting in either an
        insufficient funds return (NSF) or an unauthorized return due to first-
        or third-party fraud. PSI is powered by a machine learning model trained
        on consumer-permissioned data. PSI provides a risk assessment, which
        includes a real-time balance check, predictive risk scores forecasting a
        consumer’s likelihood of having sufficient funds over a 10-day period, a
        real-time score predicting the likelihood of an unauthorized return, and
        risk attributes to explain and enhance decisioning. Provision and use of
        this report is subject to all applicable obligations of the FCRA and any
        applicable analogous state law. This product may only be used for the
        stated permissible purpose under the FCRA.

