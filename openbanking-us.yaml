    MfaChallenge:
      description: MFA challenges required to log in
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                mfaChallenges:
                  type: array
                  minItems: 1
                  description:
                    The required MFA Challenges required in order to log in.
                  items:
                    type: object
                    required:
                      - id
                      - prompt
                      - mfaType
                      - choiceIds
                      - eventStreamId
                    properties:
                      id:
                        type: string
                        description: The unique identifier for the MFA challenge
                        format: uuid
                        example: 9082affa-d965-40be-a3ed-a320bb3467ff
                        minLength: 36
                        maxLength: 36
                      mfaType:
                        type: string
                        description: >-
                          The type of MFA challenge:
                            * TFA_TEXT:  This challenge type will present a
                          single input box to the customer and is commonly used
                          for things like One-Time Passwords.
                            * TFA_CHOICE: The TFA_CHOICE object represents a
                          multiple choice question and answer selection.
                            * TFA_MULTI: The TFA_MULTI challenge type will
                          present the customer with multiple images to select
                          from.
                            * TFA_IMAGE: A TFA_IMAGE challenge will present a
                          captcha-style image the customer will need to
                          decipher.
                        example: TFA_TEXT
                      prompt:
                        type: string
                        description: The MFA prompt text
                        example: 'Which high school did you attend'
                      choiceIds:
                        type: array
                        description:
                          An array of unique identifiers for the MFA choices
                        items:
                          type: string
                          description: The unique identifier for the MFA choice
                          format: uuid
                          example: '9082affa-d965-40be-a3ed-a320bb3467ff'
                          minLength: 36
                          maxLength: 36

    AvailableEventsResponse:
      description: List of all available events.
      content:
        application/json:
          schema:
            type: object
            required:
              - events
            properties:
              events:
                type: array
                description: List of available events.
                items:
                  $ref: '#/components/schemas/AvailableEvent'
          examples:
            AvailableEventsResponseExample:
              $ref: '#/components/examples/AvailableEventsResponseExample'

    TestWebhookSubscriptionResponse:
      description: test subscription submitted successfully.
    NoBody:
      description: Empty Response Body
    GenerateOAuthUrl:
      description: >-
        The returned oauth url, as well as a reference back to this resource in
        case modifications are needed
      content:
        application/json:
          schema:
            type: object
            description: The response object for requests to generate OAuth URLs
            required:
              - id
              - url
              - eventStreamId
            example:
              id: 8d9d8f5e-2c5f-4f49-bf9b-276a7df0367f
              url: 'https://example.com'
              eventStreamId: 208a1170-875e-4656-85d0-27dfc3ee7137
            properties:
              id:
                type: string
                format: uuid
                example: 8d9d8f5e-2c5f-4f49-bf9b-276a7df0367f
                minLength: 36
                maxLength: 36
                description: Unique reference to the login session
              url:
                type: string
                format: uri
                example: 'https://example.com'
                minLength: 1
                maxLength: 1024
                description: The oauth url to direct the user to
              eventStreamId:
                $ref: '#/components/schemas/EventStreamId'

    LoginForms:
      description: Generate a new login form entry
      content:
        application/json:
          schema:
            type: object
            description:
              The data used by the calling application to render a login form
            example:
              id: 8d9d8f5e-2c5f-4f49-bf9b-276a7df0367f
              eventStreamId: 208a1170-875e-4656-85d0-27dfc3ee7137
              elements:
                - id: 26410b1f-0347-4d57-bb03-f44d00e785e2
                  label: username
                  sortOrder: 0
                - id: f2ce62c2-877f-4c26-9935-d1ab6084e6d0
                  label: password
                  sortOrder: 1
            properties:
              id:
                type: string
                minLength: 36
                maxLength: 36
                example: 8d9d8f5e-2c5f-4f49-bf9b-276a7df0367f
                format: uuid
                description:
                  The unique identifier associated with this session'ed form
              eventStreamId:
                $ref: '#/components/schemas/EventStreamId'
              elements:
                type: array
                description: An array of elements that is to be rendered
                items:
                  type: object
                  minProperties: 1
                  maxProperties: 10
                  properties:
                    id:
                      type: string
                      format: uuid
                      minLength: 36
                      maxLength: 36
                      example: 26410b1f-0347-4d57-bb03-f44d00e785e2
                      description:
                        The session specific identifier for the login form
                        element
                    label:
                      type: string
                      description: The human-readable name of the element
                      example: Username
                      minLength: 1
                      maxLength: 512
                    sortOrder:
                      type: integer
                      default: 0
                      example: 0
                      minimum: 0
                      maximum: 10
                      description:
                        A hint to indicate what order to render the elements in
                  required:
                    - id
                    - label
                    - sortOrder
            required:
              - id
              - elements
              - eventStreamId
