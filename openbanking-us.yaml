      description: >-
        An optional configuration object can be applied by including a valid
        `configurationId` in the request body. <br><br> The preferred language
        translation for the login form is request with the `language` property
        in the request body. Supported languages are:
          * English: `en`
          * English-United States:'en-us`
          * Spanish: `es`
          * Spanish-United States: `es-us`
          * French: `fr`
          * French-Canada: `fr-ca`
      content:
        application/json:
          schema:
            type: object
            description: Object used to generate a new session'ed login form.
            required:
              - language
              - customerId
              - serviceAgreement
            properties:
              language:
                type: string
                description: >-
                  The preferred language translation of the requested login
                  form. Supported languages are English:'en', English-United
                  States:'en-us', Spanish:'es', Spanish-United States:'es-us',
                  French:'fr', French-Canada:'fr-ca'
                example: 'en'
              customerId:
                $ref: '#/components/schemas/CustomerId'
              configurationId:
                $ref: '#/components/schemas/ConfigurationId'
              serviceAgreement:
                $ref: '#/components/schemas/ServiceAgreement'

    CreateSubscriptionRequest:
      description: Request body for creating event subscription.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Subscription'
          examples:
            CreateSubscriptionRequestExample:
              $ref: '#/components/examples/SubscriptionRequestExample'
    UpdateSubscriptionRequest:
      description: Request body for updating event subscription.
      required: true
